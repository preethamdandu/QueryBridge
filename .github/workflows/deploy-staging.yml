name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: querybridge_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/querybridge_test
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      MCP_TRANSPORT_MODE: stub

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: server

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: server

      - name: Type check
        run: npm run build

      - name: Tests
        run: npm run test && npm run test:integration

      - name: Build Docker images
        run: |
          echo "Docker build step (ECR push would go here)"

      - name: Deploy to ECS staging
        run: |
          echo "ECS deployment step (aws ecs update-service would go here)"

      - name: Smoke test staging
        run: |
          echo "Staging smoke test step"
