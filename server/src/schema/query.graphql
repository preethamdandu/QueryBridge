scalar DateTime
scalar JSON
scalar UUID

type HealthStatus {
  ok: Boolean!
  service: String!
}

type Viewer {
  id: ID!
  email: String!
  createdAt: DateTime
}

type LLMResult {
  text: String!
  provider: String!
  model: String!
}

type AnalyticsSummary {
  range: String!
  totalQueries: Int!
  errorRate: Float!
  p95Ms: Int!
}

input LLMQueryInput {
  prompt: String!
}

type Query {
  health: HealthStatus
  viewer: Viewer @auth
  llmQuery(input: LLMQueryInput!): LLMResult @auth @complexity(value: 100) @rateLimit(max: 30, windowSeconds: 60)
  analyticsSummary(range: String!): AnalyticsSummary @auth @complexity(value: 50)
}
